services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simex_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - simex

  nginx:
    image: nginx:alpine
    container_name: simex_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./Docker/Nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - simex

networks:
  simex:
